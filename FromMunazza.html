<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Baby Snowy ❤️</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:linear-gradient(180deg,#13001f,#2b003d,#520033);
    font-family:'Segoe UI',sans-serif;
}

#hearts{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
}

.heart{
    position:absolute;
    bottom:-60px;
    animation:float linear infinite;
    opacity:.9;
}

@keyframes float{

0%{
transform:translateY(0) rotate(0deg) scale(.8);
opacity:0;
}

15%{
opacity:1;
}

100%{
transform:translateY(-120vh) rotate(720deg) scale(1.4);
opacity:0;
}

}

/* Giant Heart */

#bigHeart{

position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:230px;
animation:beat .9s infinite;
filter:drop-shadow(0 0 20px hotpink);

}

@keyframes beat{

0%,100%{
transform:translate(-50%,-50%) scale(1);
}

50%{
transform:translate(-50%,-50%) scale(1.18);
}

}

/* Message */

#message{

position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
display:none;
text-align:center;

}

#message h1{

font-size:70px;
font-weight:900;
color:#ff7ac8;

text-shadow:
0 0 10px #ff0080,
0 0 20px #ff1493,
0 0 40px #ff1493,
0 0 70px #ff4da6;

}

#message p{

margin-top:20px;
font-size:28px;
color:white;
letter-spacing:3px;

}

/* Explosion Hearts */

.burst{

position:absolute;
font-size:34px;
pointer-events:none;
animation:explode 2.3s forwards;

}

@keyframes explode{

0%{
transform:translate(0,0) scale(1);
opacity:1;
}

100%{

transform:
translate(var(--x),var(--y))
rotate(720deg)
scale(.2);

opacity:0;

}

}

</style>
</head>

<body>

<div id="hearts"></div>

<div id="bigHeart">❤️</div>

<div id="message">
    <h1>💖 My Baby Snowy 💖</h1>
    <p>❤️ Forever In My Heart ❤️</p>
</div>

<script>

const container=document.getElementById("hearts");

const colors=[
"#ff0033",
"#ff3366",
"#ff4d88",
"#ff5ca8",
"#ff66b2",
"#ff1493",
"#ff80bf",
"#ff007f",
"#ff1744",
"#ff3399",
"#ff99cc"
];

/* Floating Hearts */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(12+Math.random()*35)+"px";
heart.style.color=colors[Math.floor(Math.random()*colors.length)];
heart.style.animationDuration=(4+Math.random()*8)+"s";

container.appendChild(heart);

setTimeout(()=>{
heart.remove();
},12000);

}

/* Hundreds of Hearts */

for(let i=0;i<350;i++){

setTimeout(createHeart,i*18);

}

setInterval(createHeart,35);

/* Giant Heart Burst */

setTimeout(burstHeart,5000);

function burstHeart(){

const big=document.getElementById("bigHeart");

const rect=big.getBoundingClientRect();

const cx=rect.left+rect.width/2;
const cy=rect.top+rect.height/2;

big.style.display="none";

/* Create Explosion */

for(let i=0;i<350;i++){

let h=document.createElement("div");

h.className="burst";

h.innerHTML="❤";

h.style.left=cx+"px";
h.style.top=cy+"px";

h.style.color=colors[Math.floor(Math.random()*colors.length)];

const angle=Math.random()*Math.PI*2;

const distance=180+Math.random()*500;

const x=Math.cos(angle)*distance+"px";
const y=Math.sin(angle)*distance+"px";

h.style.setProperty("--x",x);
h.style.setProperty("--y",y);

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},2400);

}

/* Show Message */

setTimeout(()=>{

const msg=document.getElementById("message");

msg.style.display="block";

msg.animate([

{
opacity:0,
transform:"translate(-50%,-50%) scale(.2)"
},

{
opacity:1,
transform:"translate(-50%,-50%) scale(1)"
}

],{

duration:1400,
fill:"forwards"

});

},900);

}

</script>

</body>
</html>
